<main class="min-h-screen bg-gray-900 text-white relative">
  <!-- Fixed Language Switcher -->
  <div class="fixed top-4 right-4 sm:top-8 sm:right-8 z-50 scale-90 sm:scale-100 origin-top-right">
    <app-language-switcher />
  </div>

  <app-hero (viewProjects)="scrollToProjects()" />

  <app-skills />

  <div #projectsRef>
    @defer (on viewport) {
    <app-projects />
    } @placeholder {
    <div class="h-96 animate-pulse bg-gray-800"></div>
    }
  </div>

  @defer (on viewport) {
  <app-education />
  <app-contact />
  <app-footer />
  <app-toast />
  } @placeholder {
  <div class="min-h-screen"></div>
  }
</main>
