<footer class="py-8 px-6 border-t border-gray-800">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row items-center justify-between gap-4">

            <div class="flex items-center gap-2 text-gray-400 text-sm">
                <lucide-icon [img]="CodeIcon" class="w-4 h-4 text-emerald-400"></lucide-icon>
                <span>{{ 'FOOTER.BUILT_WITH' | translate }}</span>
            </div>

            <div class="flex items-center gap-2 text-gray-400 text-sm">
                <span>{{ 'FOOTER.RIGHTS' | translate: { year: currentYear } }}</span>
            </div>

            <div class="text-gray-400 text-sm">
                <span class="font-mono text-emerald-400">v1.1.0</span>
            </div>

        </div>
    </div>
</footer>
