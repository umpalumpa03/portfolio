<section class="py-12 md:py-20 px-4 sm:px-6 relative">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-12 md:mb-16">
            <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-4">
                {{ 'PROJECTS.TITLE' | translate }}
            </h2>
            <p class="text-gray-400 text-base sm:text-lg max-w-2xl mx-auto">
                {{ 'PROJECTS.SUBTITLE' | translate }}
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
            @for (project of projects; track project.id) {
            <div class="group relative">
                <div
                    class="absolute -inset-0.5 bg-gradient-to-r rounded-lg blur opacity-0 group-hover:opacity-100 transition duration-500">
                </div>

                <div
                    class="relative bg-gray-800/80 backdrop-blur-sm border border-gray-700 rounded-lg overflow-hidden hover:border-emerald-400/50 transition-all duration-300">

                    <div class="relative h-48 overflow-hidden">
                        <img [src]="project.image" [alt]="project.title"
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/40 to-transparent">
                        </div>
                    </div>

                    <div class="p-6 space-y-4">
                        <h3 class="text-xl font-bold text-white group-hover:text-emerald-400 transition-colors">
                            {{ getProjectTitle(project) }}
                        </h3>

                        <p class="text-gray-400 text-sm leading-relaxed line-clamp-3">
                            {{ getProjectDescription(project) }}
                        </p>

                        <div class="flex flex-wrap gap-2">
                            @for (tag of project.tags; track tag) {
                            <span
                                class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-gray-700/50 text-emerald-400 border border-emerald-400/30 hover:bg-emerald-400/10 transition-colors">
                                {{ tag }}
                            </span>
                            }
                        </div>

                        <div class="flex gap-3 pt-2">
                            <a [href]="project.liveUrl" target="_blank"
                                class="inline-flex items-center justify-center flex-1 bg-emerald-500 hover:bg-emerald-600 text-white rounded-md px-3 py-2 text-sm font-medium transition-colors cursor-pointer">
                                <img class="mr-2 brightness-0 invert" src="svgs/projects/live-demo.svg"
                                    alt="Live Demo Button" />
                                {{ 'PROJECTS.LIVE_DEMO' | translate }}
                            </a>

                            <a [href]="project.githubUrl" target="_blank"
                                class="inline-flex items-center justify-center border border-gray-600 hover:border-emerald-400 hover:text-emerald-400 text-gray-300 rounded-md px-3 py-2 text-sm font-medium transition-colors cursor-pointer">
                                <img class="brightness-0 invert" src="svgs/projects/github.svg" alt="GitHub Button" />
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>
